        note: Brocade library system documentation page.
      - url: https://www.uantwerpen.be/en/
        status: 200
        note: Official institutional website (English).
      - url: https://x.com/uantwerpen
        status: 200
        note: Official @UAntwerpen X/Twitter account.
      - url: https://www.linkedin.com/school/university-of-antwerp/
        status: 999
        note: LinkedIn anti-bot status code; school page resolves in a normal browser.
      - url: https://www.uantwerpen.be/nl/projecten/anet/open-data/
