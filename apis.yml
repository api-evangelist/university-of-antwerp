apis:
  - aid: university-of-antwerp:irua-oai-pmh
    name: IRUA OAI-PMH Metadata API
    description: >-
      Open Archives Initiative Protocol for Metadata Harvesting (OAI-PMH 2.0)
      interface for the Institutional Repository University of Antwerp (IRUA),
      exposing scholarly publication metadata for harvesting. Supports the standard
      OAI-PMH verbs (Identify, ListMetadataFormats, ListRecords, etc.). Verified
      live returning valid OAI-PMH XML with repository name "Institutional
      Repository University of Antwerp (IRUA)".
    humanURL: https://www.openarchives.org/OAI/openarchivesprotocol.html
    baseURL: https://repository.uantwerpen.be/oai/abua/
    tags: [ Library, Institutional Repository, OAI-PMH, Metadata, Open Data, Research ]
    properties:
      - type: Documentation
        url: https://www.openarchives.org/OAI/openarchivesprotocol.html
  - aid: university-of-antwerp:brocade
    name: Brocade Library Services (Anet)
    description: >-
      Brocade is the integrated, web-based library management system developed by
      Anet, the software department of the University of Antwerp Library, since 1998.
      It powers the catalog of the Anet network of academic libraries and uses open
      standards such as Z39.50, MARC, OAI-PMH, EAD and EAC. Related open-source
      components and library tooling are published under the anet-be GitHub
      organization (17 public repositories). No public self-service REST API base
      URL is documented for general use.
    humanURL: https://www.uantwerpen.be/nl/projecten/anet/brocade/
    tags: [ Library, Brocade, Anet, Open Source, Z39.50, MARC ]
    properties:
      - type: Documentation
        url: https://www.uantwerpen.be/nl/projecten/anet/brocade/
      - type: GitHub
        url: https://github.com/anet-be
