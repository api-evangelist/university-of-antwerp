---
aid: university-of-antwerp
name: University of Antwerp
description: >-
  The University of Antwerp (Universiteit Antwerpen) is a public research university
  in Antwerp, Belgium, ranked #267 in the QS World University Rankings 2025. Its
  public developer and API footprint is centered on its library and scholarly
  infrastructure: the university library's software department, Anet, builds the
  open-source Brocade library management system and publishes code via the anet-be
  GitHub organization. The Institutional Repository University of Antwerp (IRUA)
  exposes scholarly metadata through a standards-based OAI-PMH interface. The
  university does not operate a general-purpose commercial developer portal;
  administrative, student-information, and identity systems are gated behind
  institutional affiliation rather than offered as public self-service APIs.
